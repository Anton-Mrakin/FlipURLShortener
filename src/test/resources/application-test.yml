spring:
  main:
    allow-bean-definition-overriding: true
  cache:
    type: redis
  data:
    redis:
      host: localhost
      port: 6379

app:
  url-limit: 100000
  short-code-length: 8
  maintenance:
    rate: PT1S
  test:
    iterations: 1000
    threads: 100
    shorten-probability: 0.2
    latency-threshold: 1000.0
    throughput-threshold: 100.0
    startup-threshold: 90000.0

resilience4j:
  ratelimiter:
    instances:
      shortenLimit:
        limit-for-period: 100000
        limit-refresh-period: 1s
        timeout-duration: 0ms
