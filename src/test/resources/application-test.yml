spring:
  main:
    allow-bean-definition-overriding: true
  cache:
    type: redis
  data:
    redis:
      host: localhost
      port: 6379
    cassandra:
      # Disable auto-configuration completely
      repositories:
        enabled: false
  datasource:
    hikari:
      # Reduce connection timeout for tests to fail fast during shutdown
      connection-timeout: 1000
      validation-timeout: 1000
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.cassandra.CassandraAutoConfiguration
      - org.springframework.boot.autoconfigure.data.cassandra.CassandraDataAutoConfiguration
      - org.springframework.boot.autoconfigure.data.cassandra.CassandraReactiveDataAutoConfiguration
      - org.springframework.boot.autoconfigure.data.cassandra.CassandraReactiveRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.data.cassandra.CassandraRepositoriesAutoConfiguration
  task:
    scheduling:
      # Disable scheduled tasks in tests to prevent errors after test containers stop
      enabled: false

cassandra:
  enabled: false

kafka:
  enabled: false

activemq:
  enabled: false

app:
  url-limit: 100000
  short-code-length: 8
  maintenance:
    rate: PT1S
  test:
    iterations: 1000
    threads: 100
    shorten-probability: 0.2
    latency-threshold: 1000.0
    throughput-threshold: 100.0
    startup-threshold: 90000.0

resilience4j:
  ratelimiter:
    instances:
      shortenLimit:
        limit-for-period: 100000
        limit-refresh-period: 1s
        timeout-duration: 0ms
