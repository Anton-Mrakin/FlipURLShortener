spring:
  application:
    name: flip-url-shortener
  datasource:
    url: jdbc:postgresql://localhost:5432/shortener
    username: user
    password: password
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: 8080
